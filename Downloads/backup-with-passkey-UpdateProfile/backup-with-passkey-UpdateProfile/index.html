  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
    }
    /* macOS-like scrollbar - Light mode */
    ::-webkit-scrollbar {
      width: 14px;
      height: 14px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.35);
      border-radius: 10px;
      border: 4px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(0,0,0,0.45);
    }
    ::-webkit-scrollbar-corner {
        background: transparent;
    }
    /* macOS-like scrollbar - Dark mode */
    .dark ::-webkit-scrollbar-thumb {
      background-color: rgba(255,255,255,0.25);
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255,255,255,0.35);
    }

    .apple-focus-ring {
        @apply focus:outline-none focus:ring-4 focus:ring-custom-pink-focus;
    }

    /* Page transition animations (Dashboard/Candidates tabs) */
    .page-content-transition-enter {
      opacity: 1; /* No transparency */
      transform: translateY(20px); /* Adjusted from 15px, scale removed */
    }
    .page-content-transition-enter-active {
      opacity: 1; /* No transparency */
      transform: translateY(0); /* Scale removed */
      transition: transform 400ms cubic-bezier(0.25, 0.1, 0.25, 1);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 2; 
    }

    /* Admin dashboard page transition animations - similar to AuthPage style */
    .admin-page-transition-enter {
      opacity: 1;
      transform: translateX(100%);
    }
    .admin-page-transition-enter-active {
      opacity: 1;
      transform: translateX(0);
      transition: all 500ms ease-in-out;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 2;
    }
    .admin-page-transition-exit {
      opacity: 1;
      transform: translateX(0);
    }
    .admin-page-transition-exit-active {
      opacity: 0;
      transform: translateX(-100%);
      transition: all 500ms ease-in-out;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
    }
    
    .admin-page-wrapper {
      /* This class is applied to the div referenced by nodeRef in admin transitions. */
    }
    .page-content-transition-exit {
      opacity: 1; /* No transparency */
      transform: translateY(0); /* Scale removed */
    }
    .page-content-transition-exit-active {
      opacity: 1; /* No transparency */
      transform: translateY(-20px); /* Adjusted from -15px, scale removed */
      transition: transform 400ms cubic-bezier(0.25, 0.1, 0.25, 1);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
    }
    
    .page-wrapper-for-transition {
      /* This class is applied to the div referenced by nodeRef. */
    }

    /* Auth Form transition animations (Login/Register toggle) */
    /* Login form animation (appears from left, exits to right for Register) */
    .auth-form-login-enter-enter {
      transform: translateX(-40px);
      opacity: 0;
    }
    .auth-form-login-enter-enter-active {
      transform: translateX(0);
      opacity: 1;
      transition: transform 300ms ease-out, opacity 200ms ease-out;
    }
    .auth-form-login-enter-exit {
      transform: translateX(0);
      opacity: 1;
    }
    .auth-form-login-enter-exit-active {
      transform: translateX(40px); /* Exits to the right when Register appears */
      opacity: 0;
      transition: transform 300ms ease-in, opacity 200ms ease-in;
    }

    /* Register form animation (appears from right, exits to left for Login) */
    .auth-form-register-enter-enter {
      transform: translateX(40px);
      opacity: 0;
    }
    .auth-form-register-enter-enter-active {
      transform: translateX(0);
      opacity: 1;
      transition: transform 300ms ease-out, opacity 200ms ease-out;
    }
    .auth-form-register-enter-exit {
      transform: translateX(0);
      opacity: 1;
    }
    .auth-form-register-enter-exit-active {
      transform: translateX(-40px); /* Exits to the left when Login appears */
      opacity: 0;
      transition: transform 300ms ease-in, opacity 200ms ease-in;
    }

    /* Register Step Form transition animations */
    /* Moving to NEXT step: Current exits LEFT, New enters from RIGHT */
    .register-step-next-enter {
      transform: translateX(50px); /* Start off-screen to the right */
      opacity: 0;
    }
    .register-step-next-enter-active {
      transform: translateX(0);
      opacity: 1;
      transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 250ms ease-out;
    }
    .register-step-next-exit {
      transform: translateX(0);
      opacity: 1;
      position: absolute; /* Keep in flow during exit */
      width: 100%;
    }
    .register-step-next-exit-active {
      transform: translateX(-50px); /* Exit to the left */
      opacity: 0;
      transition: transform 300ms cubic-bezier(0.36, 0, 0.66, -0.56), opacity 250ms ease-in;
    }

    /* Moving to PREVIOUS step: Current exits RIGHT, New enters from LEFT */
    .register-step-prev-enter {
      transform: translateX(-50px); /* Start off-screen to the left */
      opacity: 0;
    }
    .register-step-prev-enter-active {
      transform: translateX(0);
      opacity: 1;
      transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 250ms ease-out;
    }
    .register-step-prev-exit {
      transform: translateX(0);
      opacity: 1;
      position: absolute; /* Keep in flow during exit */
      width: 100%;
    }
    .register-step-prev-exit-active {
      transform: translateX(50px); /* Exit to the right */
      opacity: 0;
      transition: transform 300ms cubic-bezier(0.36, 0, 0.66, -0.56), opacity 250ms ease-in;
    }

    /* Login Success Overlay transition animations */
    .login-overlay-transition-enter {
      opacity: 0;
      transform: scale(1.15);
    }
    .login-overlay-transition-enter-active {
      opacity: 1;
      transform: scale(1);
      transition: opacity 300ms ease-in-out, transform 350ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .login-overlay-transition-exit {
      opacity: 1;
      transform: scale(1);
    }
    .login-overlay-transition-exit-active {
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 250ms ease-in, transform 250ms cubic-bezier(0.6, -0.28, 0.735, 0.045);
    }

    /* Register form container styles */
    .register-form-container {
      max-height: 70vh;
      overflow-y: auto;
    }
    
    /* Custom scrollbar for register form */
    .register-form-container::-webkit-scrollbar {
      width: 6px;
    }
    
    .register-form-container::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }
    
    .register-form-container::-webkit-scrollbar-thumb {
      background: rgba(97, 18, 50, 0.6);
      border-radius: 3px;
    }
    
    .register-form-container::-webkit-scrollbar-thumb:hover {
      background: rgba(97, 18, 50, 0.8);
    }

    /* Smooth backdrop blur animation */
    .backdrop-blur-lg {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* Enhanced shadow for registration form */
    .register-form-shadow {
      box-shadow: 
        0 20px 25px -5px rgba(0, 0, 0, 0.1),
        0 10px 10px -5px rgba(0, 0, 0, 0.04),
        0 0 0 1px rgba(255, 255, 255, 0.1);
    }
    
    /* Dark mode shadow for registration form */
    .dark .register-form-shadow {
      box-shadow: 
        0 20px 25px -5px rgba(0, 0, 0, 0.25),
        0 10px 10px -5px rgba(0, 0, 0, 0.1),
        0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    /* Registration form entrance animation */
    @keyframes slideInFromRight {
      0% {
        transform: translateX(100px);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideInFromLeft {
      0% {
        transform: translateX(-100px);
        opacity: 0;
      }
      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Text shadow for better readability on background */
    .text-shadow {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .text-shadow-lg {
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
    }

    /* Utility to hide scrollbars */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

  </style>
